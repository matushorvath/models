name: Build

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        directory: [
          basket-cover, basket-cover-2, box-lid, cabinet-light, computer-foot, excel-box,
          fiber-light, gillette, pidp11, tray-holder, wallet, watch-band, wc-frame
        ]

    steps:
      - name: Checkout sources
        uses: actions/checkout@v3

      - name: Install OpenSCAD
        run: sudo apt install openscad

      - name: Install BOSL
        run: |
          wget --output-document /tmp/bosl.tar.gz https://github.com/revarbat/BOSL/archive/refs/tags/v1.0.3.tar.gz
          mkdir -p $HOME/.local/share/OpenSCAD/libraries/BOSL
          tar -xzf /tmp/bosl.tar.gz --directory=$HOME/.local/share/OpenSCAD/libraries/BOSL --strip-components=1

      - name: Build the model
        run: |
          make -C ${{ matrix.directory }}

      - name: Build the renders
        if: github.ref == 'refs/heads/main'
        run: |
          make -C ${{ matrix.directory }} preview
          git checkout assets
          git add ${{ matrix.directory }}
          git commit -m "Update renders for ${{ matrix.directory }}"

      - name: Push the assets branch
        if: github.ref == 'refs/heads/main'
        uses: nick-fields/retry@v3
        with:
          max_attempts: 10
          retry_wait_seconds: 3
          command: |
            git fetch origin assets
            git rebase origin/assets
            git push origin assets
